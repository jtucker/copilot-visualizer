name: Release

# Trunk-based: a successful merge (push) to main re-runs the tests, then
# computes the next semantic version from Conventional Commits, tags it, zips
# the installable extension files, and publishes a GitHub Release.
#
# default_bump: patch guarantees a release on every merge to main; feat: bumps
# minor and feat!: / "BREAKING CHANGE" bumps major. Squash-merging a PR puts the
# PR title / squashed body on main, so write the squash commit using
# Conventional Commit syntax to control the bump.
on:
  push:
    branches: [main]

permissions:
  contents: write

# Never run two releases at once; do not cancel an in-flight release.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run unit tests
        run: node --test

  release:
    name: Tag & release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version & create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          default_bump: patch

      - name: Build release archive
        if: steps.tag.outputs.new_tag != ''
        run: |
          set -euo pipefail
          version="${{ steps.tag.outputs.new_version }}"
          staging="copilot-visualizer"
          mkdir -p "$staging"
          cp extension.mjs viz-core.mjs client.html copilot-extension.json README.md "$staging"/
          cp -r assets "$staging"/assets
          zip -r "copilot-visualizer-${version}.zip" "$staging"

      - name: Create GitHub release
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          files: copilot-visualizer-${{ steps.tag.outputs.new_version }}.zip
